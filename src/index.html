<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Quiz Game</title>
    <link rel="icon" href="/src/assets/icon/quizlogo.jpg">
</head>
<body>
    <div class="container">
        <div id="setup-screen">
            <div id="quiz-head">
                <img class="left-logo" src="/src/assets/icon/quizlogo.jpg" alt="">
                <h1>Quiz Game</h1>
            </div>

            <!-- Category Selection -->
            <div>
                <label for="category">Category:</label>
                <select id="category">
                    <option value="general">General Knowledge</option>
                    <option value="movie">Movies</option>
                    <option value="sport">Sports</option>
                </select>
            </div>

            <!-- Difficulty Level Selection -->
            <div>
                <label for="difficulty">Difficulty:</label>
                <select id="difficulty">
                    <option value="easy">Easy</option>
                    <option value="medium">Medium</option>
                    <option value="hard">Hard</option>
                </select>
            </div>
            <button id="start-btn">Start Quiz</button>
        </div>

        <!-- Quiz Screen -->
        <div id="quiz-screen" class="hidden">
            <h1 id="question-category"></h1>
            <div class="scores">
                <div id="player1-score" class="player-score">Player 1: 0</div>
                <div id="player2-score" class="player-score">Player 2: 0</div>
            </div>

            <!-- Timer -->
            <div class="timer" id="timer">10</div>
            <h2 id="question-text">Question</h2>
            <div id="options-container"></div>
            <button id="next-btn" class="hidden">Next Question</button>
        </div>

        <!-- Results Screen -->
        <div id="results-screen" class="hidden">
            <h1>Quiz Results</h1>
            <div class="leaderboard">
                <table id="leaderboard-table">
                    <thead>
                        <tr>
                            <th>Player</th>
                            <th>Score</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
            <button id="restart-btn">Play Again</button>
        </div>
    </div>

    <script src="scripts/main.ts" type="module"></script>
</body>
</html>
